security:
    # Admins can access all ROLE_USER-protected app routes without storing ROLE_USER in the DB.
    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api_login:
            pattern: '^/api/login$'
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: App\Security\JWTAuthenticationSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api_platform:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\EmailVerifiedUserChecker
            custom_authenticator: App\Security\LoginAuthenticator

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/landing$, roles: PUBLIC_ACCESS }
        - { path: ^/landing/why-us$, roles: PUBLIC_ACCESS }
        - { path: ^/landing/about$, roles: PUBLIC_ACCESS }
        - { path: ^/landing/products$, roles: PUBLIC_ACCESS }
        - { path: ^/landing/team$, roles: PUBLIC_ACCESS }
        - { path: ^/contact$, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: '^/api/login$', roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/resend-verification, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/staff, roles: ROLE_STAFF }
        - { path: ^/dashboard, roles: ROLE_ADMIN }
        - { path: ^/ordering, roles: ROLE_USER }
        - { path: ^/my-orders, roles: ROLE_USER }
        - { path: ^/activity/log, roles: ROLE_ADMIN }
        - { path: ^/transaction/report, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin/customers, roles: ROLE_ADMIN }
        - { path: ^/settings, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10